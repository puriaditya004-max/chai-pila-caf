<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Chai Pila Cafe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --primary:#C84B11; --bg:#fff; --bg2:#F9F5F0; --text:#1A1008; --muted:#6B5B4E; --border:#EDE3D8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg2); color:var(--text); }
  .topbar { background:var(--primary); color:white; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; }
  .topbar h1 { font-family:'Playfair Display',serif; font-size:20px; }
  .topbar a { color:white; font-size:13px; opacity:0.8; text-decoration:none; }
  .topbar a:hover { opacity:1; }
  .container { max-width:1100px; margin:24px auto; padding:0 20px; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .stat-card { background:white; border-radius:12px; padding:20px; border:1.5px solid var(--border); }
  .stat-card .num { font-size:32px; font-weight:700; color:var(--primary); }
  .stat-card .lbl { font-size:13px; color:var(--muted); margin-top:4px; }
  .orders-table { background:white; border-radius:12px; border:1.5px solid var(--border); overflow:hidden; }
  .table-header { display:grid; grid-template-columns:60px 1fr 120px 100px 120px 140px; padding:12px 16px; background:var(--bg2); font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1.5px solid var(--border); }
  .order-row { display:grid; grid-template-columns:60px 1fr 120px 100px 120px 140px; padding:14px 16px; border-bottom:1px solid var(--border); align-items:center; font-size:13px; transition:background 0.15s; }
  .order-row:hover { background:var(--bg2); }
  .order-row:last-child { border-bottom:none; }
  .order-id { font-weight:700; color:var(--primary); }
  .items-list { font-size:12px; color:var(--muted); }
  .status-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; display:inline-block; }
  .status-confirmed { background:#e8f5e9; color:#2e7d32; }
  .status-pending { background:#fff3e0; color:#e65100; }
  .status-delivered { background:#e3f2fd; color:#1565c0; }
  .status-cancelled { background:#fce4ec; color:#c62828; }
  .status-preparing { background:#f3e5f5; color:#6a1b9a; }
  .status-out_for_delivery { background:#e0f7fa; color:#006064; }
  select.status-select { padding:4px 8px; border-radius:6px; border:1.5px solid var(--border); font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; background:white; }
  .total-cell { font-weight:700; color:var(--primary); }
  .refresh-btn { background:var(--primary); color:white; border:none; padding:9px 20px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .section-head h2 { font-size:17px; font-weight:700; }
  .time-cell { font-size:11px; color:var(--muted); }
  .loading { text-align:center; padding:40px; color:var(--muted); }
  .empty { text-align:center; padding:40px; color:var(--muted); font-size:15px; }
</style>
</head>
<body>
<div class="topbar">
  <h1>☕ Chai Pila — Admin Panel</h1>
  <a href="/">← Back to Website</a>
</div>
<div class="container">
  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="num" id="s-total">—</div><div class="lbl">Total Orders</div></div>
    <div class="stat-card"><div class="num" id="s-today">—</div><div class="lbl">Today's Orders</div></div>
    <div class="stat-card"><div class="num" id="s-revenue">—</div><div class="lbl">Total Revenue</div></div>
    <div class="stat-card"><div class="num" id="s-pending">—</div><div class="lbl">Pending Orders</div></div>
  </div>
  <div class="section-head">
    <h2>📋 All Orders</h2>
    <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
  </div>
  <div class="orders-table">
    <div class="table-header">
      <div>#ID</div><div>Items</div><div>Customer</div><div>Total</div><div>Status</div><div>Time</div>
    </div>
    <div id="ordersBody"><div class="loading">Orders load ho rahi hain...</div></div>
  </div>
</div>
<script>
  async function loadOrders() {
    try {
      const res = await fetch('/api/orders');
      const data = await res.json();
      if (!data.success) return;
      const orders = data.data;

      // Stats
      const today = new Date().toDateString();
      let revenue = 0, pending = 0, todayCount = 0;
      orders.forEach(o => {
        revenue += o.total;
        if (o.status === 'pending' || o.status === 'confirmed') pending++;
        if (new Date(o.created_at).toDateString() === today) todayCount++;
      });
      document.getElementById('s-total').textContent = orders.length;
      document.getElementById('s-today').textContent = todayCount;
      document.getElementById('s-revenue').textContent = '₹' + revenue;
      document.getElementById('s-pending').textContent = pending;

      if (!orders.length) {
        document.getElementById('ordersBody').innerHTML = '<div class="empty">🍽️ Abhi koi order nahi aaya</div>';
        return;
      }

      document.getElementById('ordersBody').innerHTML = orders.map(o => {
        const itemsList = o.items.map(i => `${i.name} ×${i.quantity}`).join(', ');
        const time = new Date(o.created_at).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
        return `<div class="order-row">
          <div class="order-id">#${o.id}</div>
          <div>
            <div style="font-weight:600;font-size:13px">${o.customer_name || 'Guest'}</div>
            <div class="items-list">${itemsList}</div>
          </div>
          <div style="font-size:12px">${o.customer_phone || '—'}</div>
          <div class="total-cell">₹${o.total}</div>
          <div>
            <select class="status-select" onchange="updateStatus(${o.id},this.value)" data-current="${o.status}">
              <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
              <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
              <option value="preparing" ${o.status==='preparing'?'selected':''}>Preparing</option>
              <option value="out_for_delivery" ${o.status==='out_for_delivery'?'selected':''}>Out for Delivery</option>
              <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
              <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
            </select>
          </div>
          <div class="time-cell">${time}</div>
        </div>`;
      }).join('');
    } catch(e) {
      document.getElementById('ordersBody').innerHTML = '<div class="empty">Server se connect nahi ho paya</div>';
    }
  }

  async function updateStatus(id, status) {
    try {
      await fetch(`/api/orders/${id}/status`, {
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ status })
      });
    } catch(e) { alert('Status update fail'); }
  }

  loadOrders();
  setInterval(loadOrders, 30000); // Auto refresh every 30 sec
</script>
</body>
</html>
